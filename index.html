<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>¿Cómo me veo?</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <!-- Un solo canvas WebGL: cámara como textura de fondo + auto encima -->
  <div id="car-layer"></div>

  <div id="start-overlay">
    <div id="start-card">
      <div id="start-logo">🚗</div>
      <h1>¿Cómo me veo?</h1>
      <p>Probá autos en realidad aumentada</p>
      <button id="start-btn">📷 Activar Cámara</button>
      <div id="error-msg"></div>
    </div>
  </div>

  <div id="hint">← mové la cabeza →</div>

  <div id="panel">
    <div id="model-chips"></div>
    <div id="color-dots"></div>
  </div>

  <script type="module" src="js/app.js?v=6"></script>
</body>
</html>
